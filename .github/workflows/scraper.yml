name: Daily News Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scripts/scraper.py

      - name: Validate JSON output
        run: python -m json.tool public/data/news.json > /dev/null && echo "✅ JSON valid"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add public/data/news.json data/news.json public/feed.xml || true
          git add data/archive/ || true
          if ! git diff --staged --quiet; then
            CASE_COUNT=$(python3 -c "import json; d=json.load(open('public/data/news.json')); print(d['metadata']['total_cases'])" 2>/dev/null || echo "?")
            git fetch origin
            git reset --soft origin/main
            git commit -m "🔄 Daily scrape: $(date -u +'%Y-%m-%d %H:%M UTC') | ${CASE_COUNT} ügy"
            git push
            echo "PUSHED=true" >> $GITHUB_ENV
          else
            echo "Nincs változás"
            echo "PUSHED=false" >> $GITHUB_ENV
          fi

      - name: Set up Node.js
        if: env.PUSHED == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node dependencies
        if: env.PUSHED == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install

      - name: Build
        if: env.PUSHED == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: env.PUSHED == 'true' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=ner-tracker --commit-dirty=true

      - name: Send email notification
        if: env.PUSHED == 'true' && env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"NER Tracker <onboarding@resend.dev>\",\"to\":[\"${NOTIFY_EMAIL}\"],\"subject\":\"[NER Tracker] Napi frissítés – ${DATE}\",\"html\":\"<h2>NER Tracker</h2><p>Az adatbázis frissült: <strong>${DATE}</strong></p><p><a href='https://ner-tracker.pages.dev'>Megtekintem →</a></p>\"}" \
            || echo "Email küldés sikertelen (nem kritikus)"
