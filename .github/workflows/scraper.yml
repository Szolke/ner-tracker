name: Daily News Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser python-dateutil pytz
      
      - name: Run scraper
        run: python scripts/scraper.py
      
      - name: Commit and push changes
        run: |
          git config user.name "NER-Bot"
          git config user.email "bot@github.com"
          git add data/news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news data - $(date -u +'%Y-%m-%d %H:%M:%S')" && git push)
