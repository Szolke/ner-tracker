name: Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check for leaked secrets in build output
        run: |
          if grep -rn "ghp_" dist/ 2>/dev/null; then
            echo "::error::GitHub token found in build output!"
            exit 1
          fi
          echo "✅ Nincs ghp_ token a dist/-ben"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: pip install -r requirements.txt

      - name: Scraper syntax check
        run: python -m py_compile scripts/scraper.py && echo "✅ scraper.py szintaxis OK"
