<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Red accent bar -->
  <rect width="1200" height="8" fill="url(#accent)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#374151" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Icon area -->
  <rect x="80" y="120" width="80" height="80" rx="16" fill="#ef4444" opacity="0.2"/>
  <text x="120" y="175" text-anchor="middle" font-size="40">🔍</text>
  <!-- Title -->
  <text x="80" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white">NER Tracker</text>
  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#9ca3af">Magyar kormányzati korrupciós ügyek nyilvántartása</text>
  <!-- Stats bar -->
  <rect x="80" y="400" width="1040" height="1" fill="#374151"/>
  <!-- Stat 1 -->
  <text x="80" y="460" font-family="system-ui" font-size="48" font-weight="800" fill="#ef4444">15+</text>
  <text x="80" y="490" font-family="system-ui" font-size="18" fill="#6b7280">Dokumentált ügy</text>
  <!-- Stat 2 -->
  <text x="320" y="460" font-family="system-ui" font-size="48" font-weight="800" fill="#3b82f6">7 000 Mrd+</text>
  <text x="320" y="490" font-family="system-ui" font-size="18" fill="#6b7280">Érintett közpénz (Ft)</text>
  <!-- Stat 3 -->
  <text x="760" y="460" font-family="system-ui" font-size="48" font-weight="800" fill="#10b981">4</text>
  <text x="760" y="490" font-family="system-ui" font-size="18" fill="#6b7280">Aktív EU nyomozás</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui" font-size="18" fill="#4b5563" text-anchor="end">ner-tracker.pages.dev</text>
</svg>
